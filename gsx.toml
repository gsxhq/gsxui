class_merger = "github.com/gsxhq/gsxui/merge.Merge"

# structpages URL generation used by site/pages/*.gsx (e.g. { Home{} |> url }).
[filters]
url = "github.com/jackielii/structpages.URLFor"

# `gsx dev` builds "." by default, but the site's main package lives in
# site/ (this module's root package is the gsxui library, not a command).
[dev]
build = ["go", "build", "-o", "tmp/gsxui-site", "./site"]
run = ["tmp/gsxui-site"]
# gsx dev tees backend output here itself (no manual `| tee` needed); the
# resolved absolute path rides the dev env bus as GSX_DEV_LOG for the vite
# plugin / dev panel to read.
log = "tmp/dev.log"
