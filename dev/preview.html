<!doctype html>
<html>
<head><meta charset="utf-8"><title>gsxui dev preview</title></head>
<body>
	<div data-gsxui-dialog class="contents" data-slot="dialog">
		<button data-slot="dialog-trigger" data-gsxui-dialog-trigger type="button">Open dialog</button>
		<dialog data-slot="dialog-content" data-gsxui-dialog-content data-state="closed">
			<h2 data-slot="dialog-title">Are you sure?</h2>
			<p data-slot="dialog-description">This cannot be undone.</p>
			<button data-slot="dialog-close" data-gsxui-dialog-close type="button" aria-label="Close">X</button>
		</dialog>
	</div>
	<pre id="log"></pre>

	<p>Avatar (good image — should show the image, fallback hidden):</p>
	<span data-slot="avatar" style="display:flex">
		<img data-slot="avatar-image" data-gsxui-avatar-image src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII=" alt="ok"/>
		<span data-slot="avatar-fallback">OK</span>
	</span>

	<p>Avatar (broken image — should show the fallback, image hidden):</p>
	<span data-slot="avatar" style="display:flex">
		<img data-slot="avatar-image" data-gsxui-avatar-image src="/does-not-exist.jpg" alt="broken"/>
		<span data-slot="avatar-fallback">XX</span>
	</span>

	<script type="module">
		import "../ui/index.js";
		const log = document.getElementById("log");
		document.addEventListener("gsxui:open", () => (log.textContent += "gsxui:open\n"));
		document.addEventListener("gsxui:close", () => (log.textContent += "gsxui:close\n"));
	</script>
</body>
</html>
